version: '3.8'

services:
  # ============================================================================
  # Nginx Reverse Proxy (Public Entry Point)
  # ============================================================================
  nginx:
    image: nginx:1.25-alpine
    container_name: trustfix_nginx
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/ssl:/etc/nginx/ssl:ro
      - static_files:/app/staticfiles:ro
      - media_files:/app/media:ro
    depends_on:
      - web
    networks:
      - trustfix_network
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://localhost/health/"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
    restart: unless_stopped

  # ============================================================================
  # Django Application (Gunicorn)
  # ============================================================================
  web:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: trustfix_web
    command: >
      sh -c "python manage.py migrate --noinput &&
             gunicorn --bind 0.0.0.0:8000 --workers 4 --threads 2 --timeout 120 --access-logfile - --error-logfile - config.wsgi:application"
    environment:
      - DEBUG=False
      - SECRET_KEY=${SECRET_KEY:-django-insecure-change-in-production}
      - ALLOWED_HOSTS=${ALLOWED_HOSTS:-localhost,127.0.0.1}
      - DATABASE_URL=${DATABASE_URL:-postgresql://trustfix:trustfix@db:5432/trustfix}
      - REDIS_URL=${REDIS_URL:-redis://redis:6379/1}
      - CELERY_BROKER_URL=${CELERY_BROKER_URL:-redis://redis:6379/0}
      - CELERY_RESULT_BACKEND=${CELERY_RESULT_BACKEND:-redis://redis:6379/0}
      - USE_SUPABASE=False
    volumes:
      - .:/app
      - logs:/app/logs
      - media_files:/app/media
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_started
    networks:
      - trustfix_network
    restart: unless_stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health/"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  # ============================================================================
  # Daphne (ASGI for WebSocket/Daphne support)
  # ============================================================================
  daphne:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: trustfix_daphne
    command: >
      sh -c "daphne -b 0.0.0.0 -p 8001 config.asgi:application"
    environment:
      - DEBUG=False
      - SECRET_KEY=${SECRET_KEY:-django-insecure-change-in-production}
      - ALLOWED_HOSTS=${ALLOWED_HOSTS:-localhost,127.0.0.1}
      - DATABASE_URL=${DATABASE_URL:-postgresql://trustfix:trustfix@db:5432/trustfix}
      - REDIS_URL=${REDIS_URL:-redis://redis:6379/1}
      - USE_SUPABASE=False
    volumes:
      - .:/app
      - media_files:/app/media
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_started
    networks:
      - trustfix_network
    restart: unless_stopped

  # ============================================================================
  # PostgreSQL Database
  # ============================================================================
  db:
    image: postgres:15-alpine
    container_name: trustfix_db
    environment:
      - POSTGRES_DB=trustfix
      - POSTGRES_USER=trustfix
      - POSTGRES_PASSWORD=${DB_PASSWORD:-trustfix_password}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    networks:
      - trustfix_network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U trustfix -d trustfix"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    restart: unless_stopped

  # ============================================================================
  # Redis (Cache & Message Broker)
  # ============================================================================
  redis:
    image: redis:7-alpine
    container_name: trustfix_redis
    command: redis-server --appendonly yes --maxmemory 256mb --maxmemory-policy allkeys-lru
    volumes:
      - redis_data:/data
    ports:
      - "6379:6379"
    networks:
      - trustfix_network
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 3
    restart: unless_stopped

  # ============================================================================
  # Celery Worker
  # ============================================================================
  celery:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: trustfix_celery
    command: celery -A config worker -l info --concurrency=2
    environment:
      - DEBUG=False
      - SECRET_KEY=${SECRET_KEY:-django-insecure-change-in-production}
      - DATABASE_URL=${DATABASE_URL:-postgresql://trustfix:trustfix@db:5432/trustfix}
      - REDIS_URL=${REDIS_URL:-redis://redis:6379/1}
      - CELERY_BROKER_URL=${CELERY_BROKER_URL:-redis://redis:6379/0}
      - CELERY_RESULT_BACKEND=${CELERY_RESULT_BACKEND:-redis://redis:6379/0}
      - USE_SUPABASE=False
    volumes:
      - .:/app
      - logs:/app/logs
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_started
    networks:
      - trustfix_network
    restart: unless_stopped

  # ============================================================================
  # Celery Beat (Scheduler)
  # ============================================================================
  celery-beat:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: trustfix_celery_beat
    command: celery -A config beat -l info
    environment:
      - DEBUG=False
      - SECRET_KEY=${SECRET_KEY:-django-insecure-change-in-production}
      - DATABASE_URL=${DATABASE_URL:-postgresql://trustfix:trustfix@db:5432/trustfix}
      - REDIS_URL=${REDIS_URL:-redis://redis:6379/1}
      - CELERY_BROKER_URL=${CELERY_BROKER_URL:-redis://redis:6379/0}
      - CELERY_RESULT_BACKEND=${CELERY_RESULT_BACKEND:-redis://redis:6379/0}
      - USE_SUPABASE=False
    volumes:
      - .:/app
      - logs:/app/logs
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_started
    networks:
      - trustfix_network
    restart: unless_stopped

  # ============================================================================
  # Flower (Celery Monitoring) - Optional
  # ============================================================================
  flower:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: trustfix_flower
    command: celery -A config flower --port=5555
    ports:
      - "5555:5555"
    environment:
      - CELERY_BROKER_URL=${CELERY_BROKER_URL:-redis://redis:6379/0}
      - CELERY_RESULT_BACKEND=${CELERY_RESULT_BACKEND:-redis://redis:6379/0}
    depends_on:
      - redis
      - celery
    networks:
      - trustfix_network
    restart: unless_stopped

  # ============================================================================
  # Mailpit (Email Testing) - Development Only
  # ============================================================================
  mailpit:
    image: axllent/mailpit:latest
    container_name: trustfix_mailpit
    ports:
      - "8025:8025"
      - "1025:1025"
    volumes:
      - mailpit_data:/data
    environment:
      - MP_DATA_FILE=/data/mailpit.db
    networks:
      - trustfix_network
    restart: unless_stopped

# ============================================================================
# Named Volumes
# ============================================================================
volumes:
  postgres_data:
    driver: local
  redis_data:
    driver: local
  mailpit_data:
    driver: local
  static_files:
    driver: local
  media_files:
    driver: local
  logs:
    driver: local

# ============================================================================
# Networks
# ============================================================================
networks:
  trustfix_network:
    driver: bridge
    name: trustfix_network